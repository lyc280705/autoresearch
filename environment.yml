# Conda environment for garbage object detection
# To create: conda env create -f environment.yml
# To update existing: conda activate Pytorch && pip install ultralytics
name: Pytorch
channels:
  - pytorch
  - conda-forge
  - defaults
dependencies:
  - python>=3.10
  - pytorch>=2.1.0
  - torchvision>=0.16.0
  - numpy>=1.24
  - pillow>=10.2
  - requests>=2.28
  - scikit-learn>=1.3
  - matplotlib>=3.7
  - pandas>=2.0
  - pyyaml>=6.0
  - pip:
    - ultralytics>=8.1.0
